---
functional:
  - Пользователь может зарегистрироваться и авторизоваться в системе
  - Пользователь может создать игру (против другого игрока, бота или друга по ссылке)
  - Пользователь может выбрать уровень сложности игры при создании матча
  - Пользователь может выбрать конкретную задачу или начать игру со случайной задачей
  - Пользователь может выбрать язык программирования перед началом игры
  - Пользователь может менять язык программирования во время игры
  - Пользователь может писать код в редакторе и запускать проверку решения (check)
  - Пользователь видит результаты выполнения тестов своего решения
  - Игроки видят код друг друга в режиме реального времени
  - Пользователь может наблюдать за чужими играми (spectator mode)
  - Пользователь может общаться в игровом чате во время матча
  - После завершения игры доступна запись матча с воспроизведением кода
  - Пользователь может просматривать историю своих игр
  - Пользователь может просматривать рейтинг игроков (за неделю, месяц, всё время)
  - Задачи должны быть доступны на русском и английском языках
  - Пользователь может переключать язык отображения условий задачи (RU/EN)
  - Система должна определять победителя по факту корректного решения и времени выполнения
non-functional:
  - Сайт должен быть оптимизирован по скорости загрузки и отклика интерфейса
  - Сайт должен быть удобен для использования (понятный UI, логичная навигация, минимальное число кликов до создания игры)
  - Сайт должен корректно работать на последних версиях популярных браузеров (Chrome, Firefox, Safari, Edge)
  - Сайт должен корректно отображаться и быть удобным на мобильных устройствах
  - Сайт должен обеспечивать защиту пользовательских данных (пароли не хранятся в открытом виде, используется шифрование)
  - Все соединения должны выполняться по HTTPS
  - Система должна выдерживать высокую нагрузку (1000 одновременных пользователей)
  - Система должна обеспечивать стабильную работу real-time функциональности (обновление редактора, статусов, тестов)
  - Сайт должен обеспечивать доступность основных функций при частичной деградации (например, при проблемах с чатом)
  - Должна быть обеспечена отказоустойчивость и восстановление после сбоев без потери критичных данных
implicit:
  - Пользователь не должен иметь возможность видеть чужие приватные игры без ссылки
  - Пользователь не должен иметь возможность отправлять вредоносный код, влияющий на сервер или других пользователей
  - Система должна корректно обрабатывать обрывы соединения и переподключение игрока во время матча
  - Должны быть предусмотрены ограничения на частоту запросов (rate limiting) для защиты от спама и DDoS
  - Пользователь не должен иметь возможность подменить результаты проверки решения (check) через клиент
  - Очки и рейтинг должны обновляться консистентно и не должны быть накручиваемыми простыми действиями
  - Чат должен иметь базовую защиту от XSS/HTML-инъекций
  - Нельзя допускать ситуацию, когда один игрок может изменять код другого игрока
  - После завершения игры состояние матча должно становиться неизменяемым (immutable replay)
  - Данные матча (код, тесты, результат) должны сохраняться для истории и записи игры

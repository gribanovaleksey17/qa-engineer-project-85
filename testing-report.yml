    - Нажать кнопку Run
  expected-result: |
    Тесты не проходят, отображается ошибка/failed tests

- summary: |
    Смена языка программирования во время матча
  requirement: |
    Пользователь может менять язык программирования во время решения
  prerequisites: |
    Создана игра против бота (Level = 1, Task = rect_area, Tags = math)
    Пользователь находится в матче
  test-data: |
    Language_1 = NodeJS
    Language_2 = Python
  steps:
    - Переключить язык на Python
  expected-result: |
    Язык переключается на Python, редактор отображает шаблон/код для Python

- summary: |
    Проверка real-time отображения кода соперника (две сессии)
  requirement: |
    Игроки должны видеть код друг друга в режиме реального времени
  prerequisites: |
    Создан матч Player vs Player
    Открыты две сессии под разными пользователями
  test-data: |
    User_1 = qa_user_01
    User_2 = qa_user_02
  steps:
    - В сессии User_1 ввести текст Input_text в редактор
    - В сессии User_2 наблюдать поле редактора соперника
  expected-result: |
    Введенный текст отображается у соперника без перезагрузки страницы

- summary: |
    Отправка сообщения в чат матч
  requirement: |
    Пользователь должен иметь возможность отправлять сообщения в чат игры
  prerequisites: |
    Пользователь авторизован
    Пользователь находится в матче
  test-data: |
    Message = Hello from QA!
  steps:
    - Ввести сообщение Message в поле чата "Hello from QA!"
    - Нажать Send
  expected-result: |
    Сообщение появляется в чате и отображается другим участникам

- summary: |
    Отправка пустого сообщения в чат
  requirement: |
    Система должна предотвращать отправку пустых сообщений
  prerequisites: |
    Пользователь авторизован
    Пользователь находится в матче
  test-data: |
    Message = ""
  steps:
    - Оставить поле сообщения пустым
    - Нажать Send
  expected-result: |
    Сообщение не отправлено, чат не изменился

- summary: |
    Отправка сообщения с HTML/JS в чат
  requirement: |
    Чат должен иметь базовую защиту от XSS/HTML-инъекций
  prerequisites: |
    Пользователь авторизован
    Пользователь находится в матче
  test-data: |
    Message = <script>alert("xss")</script>
  steps:
    - Ввести сообщение Message в чат
    - Нажать Send
  expected-result: |
    Сообщение отображается как текст, скрипт не выполняется

- summary: |
    Просмотр активной игры
  requirement: |
    Пользователь должен иметь возможность наблюдать за ходом игры других пользователей
  prerequisites: |
    В системе существует активная публичная игра
    Пользователь авторизован
  test-data: |
    Game type = Public active match
  steps:
    - Нажать Join a game
    - Выбрать любую активную публичную игру
    - Нажать Show
  expected-result: |
    Игра открывается в режиме наблюдателя, отображаются оба редактора и прогресс

- summary: |
    Проверка отображения рейтинга игроков
  requirement: |
    Пользователь может просматривать рейтинг игроков для разных языков программирования
  prerequisites: |
    Открыта страница Hall of Fame
  test-data: |
    Languages = all, java, python 
    Clans = all
  steps:
    - Открыть раздел рейтинга Hall of Fame Languages = all
    - Переключить Languages на java
    - Переключить Languages на python
  expected-result: |
    Рейтинг корректно обновляется для каждого языка программирования

- summary: |
    Проверка сохранения игры при обновлении страницы
  requirement: |
    Система должна корректно обрабатывать переподключение игрока во время матча
  prerequisites: |
    Пользователь находится в активной игре
  test-data: |
    Browser action = Refresh (F5)
    Code_before_refresh = const a = 1;
  steps:
    - Ввести Code_before_refresh в редактор
    - Обновить страницу браузера
  expected-result: |
    Пользователь возвращается в матч, игра активна, соединение восстановлено

- summary: |
    Проверка сохранения введенного кода после переподключения
  requirement: |
    Система должна сохранять введенный пользователем код при переподключении
  prerequisites: |
    Пользователь находится в активной игре
  test-data: |
    Code_fragment = function test(){ return 1; }
    Network simulation = Disable/Enable internet
  steps:
    - Ввести Code_fragment в редактор
    - Отключить интернет на 10 секунд
    - Включить интернет, появляется сообщение "Connection lost, please reload the page"
    - Обновить страницу браузера
  expected-result: |
    Соединение восстанавливается, введенный код не теряется


---
- summary: |
    Регистрация пользователя с валидными данными
  requirement: |
    Пользователь должен иметь возможность зарегистрироваться в системе
  prerequisites: |
    Открыта главная страница Codebattle
    Пользователь не авторизован
  test-data: |
    Nickname = qa_user_01
    Email = qa_user_01@mail.com
    Password = Qwerty123!
  steps:
    - Нажать кнопку Sign up
    - Заполнить поле Nickname значением из test-data
    - Заполнить поле Email значением из test-data
    - Заполнить поле Password значением из test-data
    - Заполнить поле Password Confirmation значением из test-data
    - Нажать кнопку Submit
  expected-result: |
    Пользователь зарегистрирован и авторизован, открывается лобби

- summary: |
    Регистрация пользователя с уже зарегистрированным email
  requirement: |
    Система должна запрещать регистрацию с email, который уже зарегистрирован
  prerequisites: |
    В системе уже существует пользователь с email qa_user_01@mail.com
    Открыта главная страница Codebattle
    Пользователь не авторизован
  test-data: |
    Nickname = qa_user_02
    Email = qa_user_01@mail.com
    Password = Qwerty123!
  steps:
    - Нажать кнопку Sign up
    - Заполнить поле Nickname значением из test-data
    - Заполнить поле Email значением из test-data
    - Заполнить поле Password значением из test-data
    - Заполнить поле Password Confirmation значением из test-data
    - Нажать кнопку Submit
  expected-result: |
    Пользователь не зарегистрирован, отображается сообщение об ошибке о занятости email

- summary: |
    Регистрация пользователя с невалидным email
  requirement: |
    Email должен проходить валидацию формата
  prerequisites: |
    Открыта главная страница Codebattle
    Пользователь не авторизован
  test-data: |
    Nickname = qa_user_03
    Email = qa_user_03mail.com
    Password = Qwerty123!
  steps:
    - Нажать кнопку Sign up
    - Заполнить поле Nickname значением из test-data
    - Заполнить поле Email значением из test-data
    - Заполнить поле Password значением из test-data
    - Заполнить поле Password Confirmation значением из test-data
    - Нажать кнопку Submit
  expected-result: |
    Регистрация не выполнена, отображается ошибка валидации email

- summary: |
    Регистрация пользователя с пустыми обязательными полями
  requirement: |
    Обязательные поля регистрации не должны быть пустыми
  prerequisites: |
    Открыта главная страница Codebattle
    Пользователь не авторизован
  test-data: |
    Nickname = ""
    Email = ""
    Password = ""
  steps:
    - Нажать Sign up
    - Оставить поля Nickname, Email, Password, Password Confirmation пустыми
    - Нажать Submit
  expected-result: |
    Регистрация не выполнена, отображаются ошибки о необходимости заполнения обязательных полей

- summary: |
    Вход пользователя с валидными данными
  requirement: |
    При корректном вводе логина и пароля пользователь должен войти в систему
  prerequisites: |
    Существует зарегистрированный пользователь
    Открыта страница логина
  test-data: |
    Email = qa_user_01@mail.com
    Password = Qwerty123!
  steps:
    - Ввести Email
    - Ввести Password
    - Нажать Submit
  expected-result: |
    Пользователь успешно авторизован и попадает в лобби

- summary: |
    Вход пользователя с неверным паролем
  requirement: |
    При неправильном логине или пароле пользователь должен получить сообщение об ошибке
  prerequisites: |
    Существует зарегистрированный пользователь
    Открыта страница логина
  test-data: |
    Email = qa_user_01@mail.com
    Password = WrongPass123!
  steps:
    - Ввести Email
    - Ввести неверный Password
    - Нажать Submit
  expected-result: |
    Пользователь не авторизован, отображается сообщение об ошибке

- summary: |
    Вход пользователя с несуществующим email
  requirement: |
    При неправильном логине или пароле пользователь должен получить сообщение об ошибке
  prerequisites: |
    Открыта страница логина
  test-data: |
    Email = not_exists_01@mail.com
    Password = Qwerty123!
  steps:
    - Ввести Email
    - Ввести Password
    - Нажать Submit
  expected-result: |
    Пользователь не авторизован, отображается сообщение об ошибке

- summary: |
    Проверка выхода пользователя из системы
  requirement: |
    Пользователь должен иметь возможность выйти из аккаунта
  prerequisites: |
    Пользователь авторизован
    Открыто лобби
  test-data: |
    User = qa_user_01
    Action = Logout
  steps:
    - Открыть аватар пользователя
    - Нажать Sign Out
  expected-result: |
    Пользователь разлогинени и попадает главную страницу codebattle
    
- summary: |
    Создание игры против бота
  requirement: |
    Пользователь должен иметь возможность создать игру против бота
  prerequisites: |
    Пользователь авторизован
    Открыто лобби
  test-data: |
    Opponent = Bot
    Level = 2
    Task = Random
    Tags = Random
  steps:
    - Нажать Create a battle
    - Выбрать Game Type = with a bot
    - Выбрать Level = 2
    - Выбрать Time control = 8 min
    - Выбрать Tags = Random
    - Выбрать Choose task by name or tags = Random
    - Нажать Create battle
  expected-result: |
    Создана игра против бота, пользователь перенаправлен на страницу матча


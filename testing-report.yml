- summary: |
    Проверка выполнения корректного решения и победы игрока
  requirement: |
    Система должна завершать игру и определять победителя при корректном решении
  prerequisites: |
    Создана игра против бота (Level = 1, Task = rect_area, Tags = math)
    Пользователь находится в матче
  test-data: |
    const _ = require("lodash");
    const R = require("rambda");
    const solution = (width, length) => {
    return width * length;
    };
    module.exports = solution;
  steps:
    - Вставить код решения из test-data
    - Нажать кнопку Run
  expected-result: |
    Все тесты пройдены, игра завершается победой пользователя

- summary: |
    Проверка отображения результата тестов при неверном решении
  requirement: |
    Пользователь должен видеть результаты тестов при ошибке в решении
  prerequisites: |
    Создана игра против бота (Level = 1, Task = rect_area, Tags = math)
    Пользователь находится в матче
  test-data: |
    const _ = require("lodash");
    const R = require("rambda");
    const solution = (width, length) => {
    return width + length;
    };
    module.exports = solution;
  steps:
    - Вставить код решения из test-data
    - Нажать кнопку Run
  expected-result: |
    Тесты не проходят, отображается ошибка/failed tests

